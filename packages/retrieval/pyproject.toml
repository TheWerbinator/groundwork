[project]
name = "groundwork-retrieval"
version = "0.1.0"
description = "Groundwork retrieval: dense + sparse hybrid search with reciprocal-rank fusion."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "groundwork-ingestion",
    "rank-bm25>=0.2.2,<1",
    "typer>=0.12,<1",
]

[project.scripts]
retrieval = "retrieval.cli:main"

[tool.uv.sources]
groundwork-ingestion = { path = "../ingestion", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/retrieval"]

[dependency-groups]
dev = ["pytest>=8,<9"]
