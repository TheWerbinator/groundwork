[project]
name = "groundwork-ingestion"
version = "0.1.0"
description = "Groundwork ingestion: chunk, embed, and load the knowledge base into Chroma."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "chromadb>=1.0,<2",
    "fastembed>=0.5,<1",
    "pydantic-settings>=2.2,<3",
    "typer>=0.12,<1",
]

[project.optional-dependencies]
# Hosted embeddings. Install with: uv sync --extra openai
openai = ["openai>=1.30,<2"]

[project.scripts]
ingestion = "ingestion.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ingestion"]

[dependency-groups]
dev = ["pytest>=8,<9"]
